<div class="auth-wrapper">
    <div class="auth-content">
        <div class="auth-bg">
            <span class="r">
                <img class="viewAr" src="/assets/img/viewAr.png" alt="" />
            </span>
            <span class="r s"></span>
            <span class="r s"></span>
            <span class="r">
                <img class="viewEn" src="/assets/img/viewEn.png" alt="" />
            </span>
        </div>
        <div class="card">
            <form [formGroup]="form">
                <div class="mb-4 d-flex justify-content-center">
                    <img class="logo-auth" src="/assets/img/title (2).png" alt="" />
                </div>

                <div class="mb-4">
                    <h1 class="m-0 font-24 font-bold text-primary">تغيير كلمة المرور</h1>
                </div>

                <div class="col-lg-12">
                    <app-prime-input-text
                        [formGroup]="form"
                        contentType="password"
                        controlName="oldPassword"
                        [label]="'الرقم السري الحالي'">
                    </app-prime-input-text>
                    @if (form.get('oldPassword')?.invalid && form.get('oldPassword')?.touched) {
                        <small class="text-red-500">هذا الحقل مطلوب</small>
                    }
                </div>

                <div class="col-lg-12">
                    <app-prime-input-text
                        [formGroup]="form"
                        contentType="password"
                        controlName="newPassword"
                        [label]="'الرقم السري الجديد'">
                    </app-prime-input-text>
                    @if (form.get('newPassword')?.invalid && form.get('newPassword')?.touched) {
                        <small class="text-red-500">هذا الحقل مطلوب</small>
                    }
                </div>

                <div class="col-lg-12">
                    <app-prime-input-text
                        [formGroup]="form"
                        contentType="password"
                        controlName="confirmPassword"
                        [label]="'تأكيد الرقم السري'">
                    </app-prime-input-text>
                </div>

                <div class="flex items-center justify-center mt-4 mb-2 gap-4">
                    <p-button label="حفظ" styleClass="p-login-button" (click)="handleChangePassword()"></p-button>
                </div>

                <p class="mb-2 text-muted">
                    الرجوع إلى الشاشة الرئيسية؟
                    <a [routerLink]="['/dashboard']">اضغط للعودة</a>
                </p>
            </form>
        </div>
    </div>
</div>
