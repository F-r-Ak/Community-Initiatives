<div class="d-flex flex-column h-100">
    <app-prime-title-toolbar [pageTitle]="pageTitle"></app-prime-title-toolbar>

    <div class="p-3">
        <!-- Total Count Cards -->
        <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
                <div class="summary-card" style="--card-color: #42A5F5">
                    <div class="summary-card__count">{{ activitiesTotalCount }}</div>
                    <div class="summary-card__label">إجمالي الأنشطة</div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="summary-card" style="--card-color: #66BB6A">
                    <div class="summary-card__count">{{ initiativesTotalCount }}</div>
                    <div class="summary-card__label">إجمالي المبادرات</div>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="row g-3 my-3 justify-content-between">
            <h4 class="text-blue">المبادرات حسب المراكز</h4>
            @for (item of citiesChartData?.labels; track item; let i = $index) {
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="summary-card" [style.--card-color]="cardColors[i % cardColors.length]">
                        <div class="summary-card__count">{{ citiesChartData.datasets[0].data[i] }}</div>
                        <div class="summary-card__label">{{ item }}</div>
                    </div>
                </div>
            }
        </div>

        <div class="row g-3">
            <!-- Fields Chart -->
            <div class="col-12 col-md-6">
                <p-card header="الأنشطة حسب حالة التنفيذ">
                    <div style="height: 300px; position: relative">
                        <p-chart type="doughnut" [data]="executionStatusChartData" [options]="chartOptions" height="300" />
                    </div>
                </p-card>
            </div>

            <!-- Cities Chart -->
            <div class="col-12 col-md-6">
                <p-card header="الأنشطة حسب المراكز">
                    <div style="height: 300px; position: relative">
                        <p-chart type="bar" [data]="citiesChartData" [options]="chartOptions" height="300" />
                    </div>
                </p-card>
            </div>
        </div>
    </div>
</div>
