<div class="card">
    <h5 >التقرير</h5>
    <form [formGroup]="form">
        <div class="row">
            <!-- Visitor Name -->
            <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2">المجال </label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="fieldId"
                        [suggestions]="filteredfeild"
                        [lazy]="false"
                        (onSelect)="onFieldSelect($event)"
                        (handleMethod)="searchField($event)"
                        field="nameAr"
                    />
                </div>
            </div>


 <div class="col-6 md:col-6 lg:col-4">
                <app-prime-datepicker [formGroup]="form" controlName="initiativeStartDate" [label]="'تاريخ المبادرة'" > </app-prime-datepicker>
            </div>
            <!-- <div class="col-6 md:col-6 lg:col-4">
                <app-prime-datepicker [formGroup]="form" controlName="initiativeEndDate" [label]="'تاريخ انتهاء المبادرة'" > </app-prime-datepicker>
            </div> -->
            <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2">المدينة</label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="cityId"
                        [suggestions]="filteredCity"
                        [lazy]="false"
                        (onSelect)="onCitySelect($event)"
                        (handleMethod)="searchCity($event)"
                        field="nameAr"
                    />
                </div>
            </div>
             
               
               <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2">اسم المبادرة</label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="name"
                        [suggestions]="filteredname"
                        [lazy]="false"
                        (onSelect)="onNameSelect($event)"
                        (handleMethod)="searchName($event)"
                        field="name"
                    />
                </div>
            </div>
            

           
<!-- <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2"> المسئول</label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="initiativeMangerName"
                        [suggestions]="filteredInitiativeMangerName"
                        [lazy]="false"
                        (onSelect)="onInitiativeMangerSelect($event)"
                        (handleMethod)="searchInitiativeMangerName($event)"
                        field="nameAr"
                    />
                </div>
            </div> -->
            


           
            <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2">اسم التقرير</label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="reportName"
                        [suggestions]="reportNames"
                        (handleMethod)="searchReportNames($event)"
                            (onSelect)="onReportNameSelect($event)"
                            
                        field="label"
                        
                    />
                </div>
            </div>
       

           

            <!-- Report Type -->
            <div class="col-6 md:col-6 lg:col-4">
                <div class="form-group d-flex flex-column mb-3">
                    <label class="text-middle font-14 font-bold mb-2">نوع التقرير</label>
                    <app-prime-autocomplete
                        [formGroup]="form"
                        controlName="reportType"
                        [suggestions]="reportTypes"
                        (handleMethod)="searchReportTypes($event)"
                            (onSelect)="onReportTypeSelect($event)"
                        field="label"
                    />
                </div>
            </div>
        </div>



        <!-- Action Buttons -->
        <div class="flex justify-content-center gap-2 mt-4">
            <p-button
                [label]="'تحميل'"
                severity="success"
                [disabled]="isGeneratingReport"
                (onClick)="onExecute()"
            />
            <p-button
                label="حذف"
                severity="secondary"
                [disabled]="isGeneratingReport"
                (onClick)="onClear()"
            />
        </div>
    </form>
</div>
