<div class="card">
    <div class="title-container">
        @if (town) {
            <div class="p-formgrid grid">
                <div class="field col-12 col-md-6">
                    <label class="font-bold text-secondary">{{ 'الاسم بالعربية' }}</label>
                    <p class="mt-1 font-16">{{ town.nameAr || '---' }}</p>
                </div>
                <div class="field col-12 col-md-6">
                    <label class="font-bold text-secondary">{{ 'المركز' }}</label>
                    <p class="mt-1 font-16">{{ town.cityName || '---' }}</p>
                </div>
            </div>
        } @else {
            <div class="d-flex justify-content-center p-4">
                <i class="pi pi-spin pi-spinner" style="font-size: 2rem;"></i>
            </div>
        }

        <div class="d-flex justify-content-end mt-3">
            <button class="main-btn align-self-center font-14 main border-radius-2 py-1 px-2 mt-2 mt-sm-0" type="button" (click)="closeDialog()">
                {{ 'إغلاق' }}
            </button>
        </div>
    </div>
</div>
